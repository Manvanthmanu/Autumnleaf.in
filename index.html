<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:#f8f6ff;
      overflow:hidden;
      font-family:'Inter',sans-serif;
      color:#18181b;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .bg-glow{
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle,#8b5cf6 0%,transparent 70%);
      opacity:.18;
      filter:blur(80px);
      top:-200px;
      right:-150px;
    }

    .bg-glow2{
      position:absolute;
      width:500px;
      height:500px;
      background:radial-gradient(circle,#c084fc 0%,transparent 70%);
      opacity:.15;
      filter:blur(100px);
      bottom:-180px;
      left:-100px;
    }

    .card{
      width:min(1100px,90%);
      min-height:650px;
      background:rgba(255,255,255,0.6);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:40px;
      padding:60px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      position:relative;
      overflow:hidden;
      box-shadow:
      0 10px 40px rgba(139,92,246,.12),
      inset 0 0 0 1px rgba(255,255,255,.5);
    }

    .left{
      display:flex;
      flex-direction:column;
      justify-content:center;
      z-index:2;
    }

    .tag{
      color:#8b5cf6;
      letter-spacing:4px;
      font-size:.8rem;
      margin-bottom:20px;
      text-transform:uppercase;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:6rem;
      line-height:.9;
      font-weight:700;
      margin-bottom:25px;
    }

    h1 span{
      color:#8b5cf6;
    }

    p{
      max-width:500px;
      color:#52525b;
      line-height:1.8;
      margin-bottom:40px;
      font-size:1rem;
    }

    .actions{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    input{
      padding:18px 22px;
      border:none;
      border-radius:100px;
      width:260px;
      outline:none;
      background:white;
      box-shadow:0 4px 20px rgba(0,0,0,.04);
      font-size:.95rem;
    }

    button{
      border:none;
      padding:18px 30px;
      border-radius:100px;
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 10px 25px rgba(139,92,246,.3);
    }

    button:hover{
      transform:translateY(-2px);
    }

    .right{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .portal{
      width:420px;
      height:540px;
      border-radius:220px 220px 40px 40px;
      background:linear-gradient(180deg,#a855f7,#7c3aed);
      position:relative;
      overflow:hidden;
      box-shadow:
      0 30px 60px rgba(139,92,246,.35),
      inset 0 0 60px rgba(255,255,255,.2);
    }

    .portal::before{
      content:"";
      position:absolute;
      inset:25px;
      border-radius:220px 220px 30px 30px;
      background:
      radial-gradient(circle at top,#ffffffaa,transparent 60%),
      linear-gradient(180deg,#f5edff,#8b5cf6);
    }

    .circle{
      position:absolute;
      width:140px;
      height:140px;
      border-radius:50%;
      background:white;
      opacity:.5;
      top:100px;
      left:50%;
      transform:translateX(-50%);
      filter:blur(2px);
    }

    .wave{
      position:absolute;
      width:600px;
      height:180px;
      background:rgba(255,255,255,.18);
      border-radius:50%;
      bottom:-40px;
      left:-80px;
      transform:rotate(-6deg);
    }

    .wave2{
      bottom:40px;
      opacity:.28;
    }

    .wave3{
      bottom:120px;
      opacity:.18;
    }

    .footer{
      position:absolute;
      bottom:35px;
      left:60px;
      color:#8b5cf6;
      letter-spacing:3px;
      font-size:.75rem;
      text-transform:uppercase;
    }

    @media(max-width:900px){

      body{
        overflow:auto;
      }

      .card{
        grid-template-columns:1fr;
        padding:40px 30px;
        margin:30px 0;
      }

      h1{
        font-size:4.5rem;
      }

      .right{
        order:-1;
      }

      .portal{
        width:300px;
        height:400px;
      }

      .footer{
        left:30px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <section class="card">

    <div class="left">
      <div class="tag">Something Beautiful Is Coming</div>

      <h1>
        Will be <span>here soon.</span>
      </h1>

      <p>
        We’re crafting a modern digital experience with creativity,
        elegance and purpose. Stay tuned for something extraordinary.
      </p>

      <div class="actions">
        <input type="email" placeholder="Enter your email">
        <button>Notify Me</button>
      </div>
    </div>

    <div class="right">

      <div class="portal">
        <div class="circle"></div>
        <div class="wave"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
      </div>

    </div>

    <div class="footer">
      Thank you for your patience
    </div>

  </section>

</body>
</html>
